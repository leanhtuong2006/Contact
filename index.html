<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lê Anh Tường</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;
  color:#fff;
  font-family:Arial;
  overflow:hidden;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
  pointer-events:none; /* cho phép click xuyên qua */
}

.page{
  position:relative;
  z-index:1;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px 20px 140px;
}

.quote{
  max-width:1100px;
  font-size:clamp(26px,5vw,64px);
  line-height:1.25;
  font-weight:bold;
  letter-spacing:-1px;
  white-space:nowrap;
}

.desc{
  margin-top:25px;
  font-size:clamp(15px,2vw,22px);
  max-width:800px;
  color:#ccc;
  line-height:1.8;
}

.contact{
  position:fixed;
  bottom:0;
  left:0;right:0;
  text-align:center;
  padding:18px;
  background:#000;
  border-top:1px solid #222;
}

.contact a{
  color:#fff;
  margin:0 10px;
  font-size:14px;
  text-decoration:none;
  opacity:.8;
}
.contact a:hover{opacity:1}

.music-note{
  margin-top:18px;
  font-size:13px;
  color:#888;
}
</style>
</head>

<body>
<canvas id="web"></canvas>

<div class="page">
  <div class="quote">“Dù trong tro tàn hoa vẫn sẽ mọc”</div>

  <div class="desc">
    Dù trong hoàn cảnh nào, chỉ cần có niềm tin và động lực sống,
    môi trường chỉ là một phần nhỏ. Chính động lực giúp con người
    chiến thắng nỗi sợ.
  </div>

  <div class="music-note">Di chuột hoặc chạm để cảm ứng & phát nhạc</div>
</div>

<div class="contact">
  <a href="https://youtube.com/@modlite" target="_blank">YouTube</a>
  <a href="https://zalo.me/0334272293" target="_blank">Zalo</a>
  <a href="https://www.tiktok.com/@anhtuong.06" target="_blank">TikTok</a>
  <a href="tel:0334272293">Hotline</a>
  <a href="bank.html">Bank</a>
</div>

<audio id="audio" loop>
  <source src="Call of silence.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById('web');
const ctx = canvas.getContext('2d');
let w,h;

function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

let particles=[];
const COUNT = 120;

for(let i=0;i<COUNT;i++){
  particles.push({
    x:Math.random()*w,
    y:Math.random()*h,
    vx:(Math.random()-0.5)*0.6,
    vy:(Math.random()-0.5)*0.6
  });
}

let mouse={x:null,y:null};

window.addEventListener('mousemove',e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
  playMusic();
});

window.addEventListener('touchmove',e=>{
  mouse.x=e.touches[0].clientX;
  mouse.y=e.touches[0].clientY;
  playMusic();
});

function draw(){
  ctx.clearRect(0,0,w,h);

  for(let i=0;i<particles.length;i++){
    let p=particles[i];

    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>w) p.vx*=-1;
    if(p.y<0||p.y>h) p.vy*=-1;

    // draw point
    ctx.beginPath();
    ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.fill();

    // connect lines
    for(let j=i+1;j<particles.length;j++){
      let p2=particles[j];
      let dx=p.x-p2.x;
      let dy=p.y-p2.y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<120){
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(p2.x,p2.y);
        ctx.strokeStyle='rgba(255,255,255,'+(1-dist/120)*0.2+')';
        ctx.stroke();
      }
    }

    // mouse interaction
    if(mouse.x){
      let dx=p.x-mouse.x;
      let dy=p.y-mouse.y;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<120){
        p.x+=dx/20;
        p.y+=dy/20;
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();

// MUSIC
const audio=document.getElementById('audio');
let started=false;
function playMusic(){
  if(started) return;
  audio.play().then(()=>started=true).catch(()=>{});
}

</script>
</body>
</html>
