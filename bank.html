<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank - Lê Anh Tường</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 20% 10%, rgba(255,255,255,0.06), transparent 30%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.05), transparent 30%),
                linear-gradient(135deg, #000000, #020617, #000000);
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px 80px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .info {
            font-size: 18px;
            line-height: 2;
            color: #ddd;
        }

        .info strong {
            color: #fff;
        }

        img {
            width: 200px;
            margin-top: 30px;
        }

        footer {
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 13px;
            color: #888;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 22px;
            }

            .info {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <h1>Bank</h1>

        <div class="info">
            <p><strong>Tên chủ tài khoản:</strong> LE ANH TUONG</p>
            <p><strong>Số tài khoản:</strong> 9334272293</p>
            <p><strong>Ngân hàng:</strong> Vietcombank</p>
        </div>

        <img src="qr-code.png" alt="QR Code">
    </div>

    <footer>
        © Lê Anh Tường 2006
    </footer>
</body>
</html>
